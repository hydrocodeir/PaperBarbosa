data_path: data/data.csv
target_variable: tmean
quantiles: [0.05, 0.5, 0.95]
quantile_grid: []
bootstrap_samples: 250
random_seed: 42
bootstrap_method: meboot
bootstrap_block_length: null
bootstrap_centered_scale: 10000.0
outlier_sigma: 7.0
max_interp_gap: 3
harmonics_per_year: 2
station_col: station_name
date_cols: [year, month, day]
station_info_path: data/stationsInfo.csv
iran_geojson_path: data/Iran.geojson
min_start_date: null
max_end_date: null
max_missing_ratio: null

homogenization:
  enabled: true
  method: snht
  min_segment: 365
  snht_threshold: 120.0
  max_breaks: 5

diagnostics:
  max_missing_ratio: 0.05
  outlier_sigma: 4.0
  ljungbox_lag: 30
